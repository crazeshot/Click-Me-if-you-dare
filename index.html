<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Girly Aesthetic Page</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffd6e0, #fbc2eb, #a6c1ee);
      overflow: hidden;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: #fff;
      margin-bottom: 30px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .btn {
      padding: 15px 40px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 105, 135, 0.4);
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 30px rgba(255, 105, 135, 0.6);
    }

    /* Floating bubbles */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: float 10s infinite;
    }

    .bubble:nth-child(1) {
      width: 60px;
      height: 60px;
      left: 20%;
      animation-duration: 12s;
    }

    .bubble:nth-child(2) {
      width: 40px;
      height: 40px;
      left: 70%;
      animation-duration: 8s;
    }

    .bubble:nth-child(3) {
      width: 80px;
      height: 80px;
      left: 50%;
      animation-duration: 15s;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="container">
